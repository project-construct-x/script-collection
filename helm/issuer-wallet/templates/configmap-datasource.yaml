# this configmap contains all database configuration that is required by the issuer-wallet runtime.

{{ $fullName := .Values.fullnameOverride -}}
{{- $postgresql := index .Values "postgresql" | default dict }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-datasource-config
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "issuer-wallet.labels" . | nindent 4 }}
data:

  ################
  ## POSTGRESQL ##
  ################

  # default
  EDC_SQL_SCHEMA_AUTOCREATE: {{ $postgresql.schemaAutocreate | default true | quote }}
  EDC_DATASOURCE_DEFAULT_URL: {{ tpl .Values.postgresql.jdbcUrl . | quote }}