{{ if .Values.wallet.superuser.createSecret -}}
{{- $fullName := .Values.fullnameOverride -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-superuser-credentials
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "wallet.labels" . | nindent 4 }}
type: Opaque
stringData:
  ################
  ## Super-User ##
  ################
  EDC_IH_API_SUPERUSER_ID: {{ .Values.wallet.superuser.id | quote }}
  EDC_IH_API_KEY_SUPERUSER: {{ .Values.wallet.superuser.apiKey | quote }}
  EDC_IH_API_SUPERUSER_PUBLIC_KEY_ALIAS: {{ .Values.wallet.superuser.publicKeyAlias | quote }}
  EDC_IH_API_SUPERUSER_PRIVATE_KEY_ALIAS: {{ .Values.wallet.superuser.privateKeyAlias | quote }}
{{- end -}}