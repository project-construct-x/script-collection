# this configmap contains all application configuration that is required by the issuer-wallet runtime.

{{ $fullName := .Values.fullnameOverride -}}
{{- $iam := index .Values "wallet" "iam" | default dict }}
{{- $issuer := index .Values "wallet" "issuer" | default dict }}
{{- $statuslist := index $issuer "statuslist" | default dict }}
{{- $defaultStlCallback := printf "https://%s%s" (index .Values.wallet.ingresses 0).hostname .Values.wallet.endpoints.statuslist.path }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-config
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "issuer-wallet.labels" . | nindent 4 }}
data:
  #######
  # API #
  #######
  EDC_HOSTNAME: {{ .Values.wallet.hostname | quote }}
  WEB_HTTP_PORT: {{ .Values.wallet.endpoints.default.port | quote }}
  WEB_HTTP_PATH: {{ .Values.wallet.endpoints.default.path | quote }}
  WEB_HTTP_IDENTITY_PORT: {{ .Values.wallet.endpoints.identity.port | quote }}
  WEB_HTTP_IDENTITY_PATH: {{ .Values.wallet.endpoints.identity.path | quote }}
  WEB_HTTP_IDENTITY_AUTH_ALIAS: {{ .Values.wallet.endpoints.identity.authKeyAlias | required ".Values.wallet.endpoints.identity.authKeyAlias is required" | quote }}
  WEB_HTTP_ISSUERADMIN_PORT: {{ .Values.wallet.endpoints.issueradmin.port | quote }}
  WEB_HTTP_ISSUERADMIN_PATH: {{ .Values.wallet.endpoints.issueradmin.path | quote }}
  WEB_HTTP_DID_PORT: {{ .Values.wallet.endpoints.did.port | quote }}
  WEB_HTTP_DID_PATH: {{ .Values.wallet.endpoints.did.path | quote }}
  WEB_HTTP_STS_PORT: {{ .Values.wallet.endpoints.sts.port | quote}}
  WEB_HTTP_STS_PATH: {{ .Values.wallet.endpoints.sts.path | quote}}
  WEB_HTTP_STATUSLIST_PORT: {{ .Values.wallet.endpoints.statuslist.port | quote }}
  WEB_HTTP_STATUSLIST_PATH: {{ .Values.wallet.endpoints.statuslist.path | quote }}
  WEB_HTTP_ISSUANCE_PORT: {{ .Values.wallet.endpoints.issuance.port | quote }}
  WEB_HTTP_ISSUANCE_PATH: {{ .Values.wallet.endpoints.issuance.path | quote }}

  ####################
  ## IAM/DID/Issuer ##
  ####################
  EDC_IAM_DID_WEB_USE_HTTPS: {{ .Values.wallet.didweb.https | quote }}
  EDC_IAM_KEY_ALGORITHM: {{ $iam.keyAlgorithm | default "RSA" | quote }}
  EDC_IAM_CREDENTIAL_RENEWAL_GRACEPERIOD: {{ $iam.renewalGraceperiod | default "172800" | quote }}
  EDC_ISSUER_ISSUANCE_SEND_RETRY_LIMIT: {{ $issuer.sendRetryLimit | default "0" | quote }}
  EDC_STATUSLIST_CALLBACK_ADDRESS: {{ $statuslist.callbackAddress | default $defaultStlCallback | quote }} 

  ###########
  ## VAULT ##
  ###########
  EDC_VAULT_HASHICORP_URL: {{ tpl .Values.vault.hashicorp.url . | quote }}
  EDC_VAULT_HASHICORP_TIMEOUT_SECONDS: {{ .Values.vault.hashicorp.timeout | quote }}
  EDC_VAULT_HASHICORP_HEALTH_CHECK_ENABLED: {{ .Values.vault.hashicorp.healthCheck.enabled | quote }}
  EDC_VAULT_HASHICORP_HEALTH_CHECK_STANDBY_OK: {{ .Values.vault.hashicorp.healthCheck.standbyOk | quote }}
  EDC_VAULT_HASHICORP_API_SECRET_PATH: {{ .Values.vault.hashicorp.paths.secret | quote }}
  EDC_VAULT_HASHICORP_API_HEALTH_CHECK_PATH: {{ .Values.vault.hashicorp.paths.health | quote }}

  #################
  ## Encryption  ##
  #################
  EDC_ENCRYPTION_AES_KEY_ALIAS: {{ .Values.vault.hashicorp.init.aesKeyAlias | default "issuer-wallet-aes-key-alias" | quote }}
  EDC_ISSUER_STATUSLIST_SIGNING_KEY_ALIAS: {{ $statuslist.signingKeyAlias | default "foo" | quote }}