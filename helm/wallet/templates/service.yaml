apiVersion: v1
kind: Service
metadata:
  name: {{ include "wallet.fullname" . }}
  namespace: {{ .Release.Namespace | default "default" | quote }}
  labels:
    {{- include "wallet.server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.wallet.service.type }}
  ports:
    - port: {{ .Values.wallet.endpoints.default.port }}
      targetPort: default
      protocol: TCP
      name: default
    - port: {{ .Values.wallet.endpoints.identity.port }}
      targetPort: identity
      protocol: TCP
      name: identity
    - port: {{ .Values.wallet.endpoints.credentials.port }}
      targetPort: credentials
      protocol: TCP
      name: credentials
    - port: {{ .Values.wallet.endpoints.did.port }}
      targetPort: did
      protocol: TCP
      name: did
    - port: {{ .Values.wallet.endpoints.sts.port }}
      targetPort: sts
      protocol: TCP
      name: sts
  selector:
    {{- include "wallet.server.selectorLabels" . | nindent 4 }}
