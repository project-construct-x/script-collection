# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Controls whether the bundled sub-charts are installed alongside the issuer-wallet.
# Set to false to use externally managed PostgreSQL or Vault instances.
install:
  postgresql: true
  vault: true

# This is to override the chart name.
fullnameOverride: "issuer"
nameOverride: "issuer"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# -- Add custom ca certificates to the truststore
customCaCerts: {}

wallet:
  # This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
  image:
    repository: "ghcr.io/project-construct-x/wallet"
    # This sets the pull policy for images.
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: "0.17.0-1"
  initContainers: []
  # This is for setting Kubernetes Labels to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
  podLabels: {}

  # This is for setting Kubernetes Annotations to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  podAnnotations: {}

  # Disables SVE (Scalable Vector Extension) instructions via JAVA_TOOL_OPTIONS.
  # Enable on nodes with SVE-capable CPUs if the JVM produces illegal instruction errors.
  useSVE: false

  # Remote debugging via JDWP. Never enable in production environments.
  debug:
    enabled: false
    # Port the JDWP agent listens on inside the container
    port: 1044
    # If true, the JVM suspends on startup until a debugger connects
    suspendOnStart: false

  # Public hostname of the issuer-wallet. Used to construct did:web URLs and ingress routing.
  hostname: "issuer.staging.construct-x.net"

  # Super-user participant seeded on first startup by the super-user-seed-extension.
  # The api key is stored in Vault under the alias derived from the participant id.
  superuser:
    # If true, a Kubernetes Secret is created from the values below and mounted via envFrom.
    # Set to false to provide the secret externally and reference it via envSecretNames.
    createSecret: true
    id: admin
    # API key for the super-user. Must follow the format base64(<id>).<random-suffix>.
    apiKey: YWRtaW4.adminKey
    publicKeyAlias: admin#pubkey
    privateKeyAlias: admin#privkey
  # -- Whether web DIDs should be interpreted as HTTPS or HTTP
  didweb:
    https: true

  # Extra environment variables that will be pass onto deployment pods
  env: {}
    
  # "valueFrom" environment variable references that will be added to deployment pods. Name is templated.
  # ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.19/#envvarsource-v1-core
  envValueFrom: {}
  #  ENV_NAME:
  #    configMapKeyRef:
  #      name: configmap-name
  #      key: value_key
  #    secretKeyRef:
  #      name: secret-name
  #      key: value_key

  # [Kubernetes Secret Resource](https://kubernetes.io/docs/concepts/configuration/secret/) names to load environment variables from
  envSecretNames: []
  #  - first-secret
  #  - second-secret

  # [Kubernetes ConfigMap Resource](https://kubernetes.io/docs/concepts/configuration/configmap/) names to load environment variables from
  envConfigMapNames: []
  #  - first-config-map
  #  - second-config-map

  # This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  livenessProbe:
    # -- Whether to enable kubernetes [liveness-probe](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
    enabled: true
    # -- seconds to wait before performing the first liveness check
    initialDelaySeconds: 5
    # -- this fields specifies that kubernetes should perform a liveness check every 5 seconds
    periodSeconds: 5
    # -- number of seconds after which the probe times out
    timeoutSeconds: 5
    # -- when a probe fails kubernetes will try 6 times before giving up
    failureThreshold: 6
    # -- number of consecutive successes for the probe to be considered successful after having failed
    successThreshold: 1

  readinessProbe:
    # -- Whether to enable kubernetes [readiness-probes](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
    enabled: true
    # -- seconds to wait before performing the first readiness check
    initialDelaySeconds: 5
    # -- this fields specifies that kubernetes should perform a readiness check every 5 seconds
    periodSeconds: 5
    # -- number of seconds after which the probe times out
    timeoutSeconds: 5
    # -- when a probe fails kubernetes will try 6 times before giving up
    failureThreshold: 6
    # -- number of consecutive successes for the probe to be considered successful after having failed
    successThreshold: 1

  # -- endpoints of the issuer-wallet
  endpoints:
    # -- default api for health checks, should not be added to any ingress
    default:
      # -- port for incoming api calls
      port: 8181
      # -- path for incoming api calls
      path: /api
    # -- management api, used by internal users, can be added to an ingress and must not be internet facing
    identity:
      # -- port for incoming api calls
      port: 15151
      # -- path for incoming api calls
      path: /api/identity
      # -- authentication key, must be attached to each 'X-Api-Key' request header
      authKeyAlias: "sup3r$3cr3t"
    # -- Issuer Admin API endpoint, must not be internet facing
    issueradmin:
      # -- port for incoming api calls
      port: 15152
      # -- path for incoming api calls
      path: /api/issuer
    # -- DID service endpoint. DID documents can be resolved from here.
    did:
      # -- port for incoming api calls
      port: 80
      # -- path for incoming api calls
      path: /
    # -- STS Endpoint, used to obtain tokens
    sts:
      # -- port for incoming api calls
      port: 9292
      # -- path for incoming api calls
      path: /api/sts
    # -- StatusList API, used to check the status of verifiable credentials. Must be internet-facing
    statuslist:
      # -- port for incoming api calls
      port: 9999
      # -- path for incoming api calls
      path: /statuslist
    # -- DCP Issuance API. Must be internet-facing.
    issuance:
      # -- port for incoming api calls
      port: 13132
      # -- path for incoming api calls
      path: /api/issuance

  # This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
  service:
    # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
    type: ClusterIP
    # Additional annotations to add to the Service resource
    annotations: {}

  ## Ingress declaration to expose the network service.
  ingresses:
    ## Public / Internet facing Ingress for the Presentation API
    - enabled: true
      # -- The hostname to be used to precisely map incoming traffic onto the underlying network service
      hostname: "issuer.staging.construct-x.net"
      # -- Additional ingress annotations to add
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
        external-dns.alpha.kubernetes.io/hostname: "issuer.staging.construct-x.net"
        external-dns.alpha.kubernetes.io/ttl: "300"
      # -- EDC endpoints exposed by this ingress resource
      endpoints:
        - issuance
        - sts
        - did
        - statuslist
      # -- Defines the [ingress class](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class) to use
      className: "nginx"
      # -- TLS [tls class](https://kubernetes.io/docs/concepts/services-networking/ingress/#tls) applied to the ingress resource
      tls:
        # -- Enables TLS on the ingress resource
        enabled: true
        # -- If present overwrites the default secret name
        secretName: "issuer-wallet-tls"
      ## Adds [cert-manager](https://cert-manager.io/docs/) annotations to the ingress resource
      certManager:
        # -- If preset enables certificate generation via cert-manager namespace scoped issuer
        issuer: ""
        # -- If preset enables certificate generation via cert-manager cluster-wide issuer
        clusterIssuer: "letsencrypt-staging"
    ## Ingress for the Identity API, should not be internet facing
    - enabled: false
      # -- The hostname to be used to precisely map incoming traffic onto the underlying network service
      hostname: "issuer.staging.construct-x.net"
      # -- Additional ingress annotations to add
      annotations: {}
      # -- EDC endpoints exposed by this ingress resource
      endpoints:
        - issueradmin
        - identity
      # -- Defines the [ingress class](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class) to use
      className: "nginx"
      # -- TLS [tls class](https://kubernetes.io/docs/concepts/services-networking/ingress/#tls) applied to the ingress resource
      tls:
        # -- Enables TLS on the ingress resource
        enabled: false
        # -- If present overwrites the default secret name
        secretName: ""
      ## Adds [cert-manager](https://cert-manager.io/docs/) annotations to the ingress resource
      certManager:
        # -- If preset enables certificate generation via cert-manager namespace scoped issuer
        issuer: ""
        # -- If preset enables certificate generation via cert-manager cluster-wide issuer
        clusterIssuer: "letsencrypt-staging"

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  # Additional volumes on the output Deployment definition.
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # -- [resource management](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/) for the container
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 128Mi

  # This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
  # This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
  replicaCount: 1
  autoscaling:
    # -- Enables [horizontal pod autoscaling](https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/)
    enabled: false
    # -- Minimal replicas if resource consumption falls below resource threshholds
    minReplicas: 1
    # -- Maximum replicas if resource consumption exceeds resource threshholds
    maxReplicas: 100
    # -- targetAverageUtilization of cpu provided to a pod
    targetCPUUtilizationPercentage: 80
    # -- targetAverageUtilization of memory provided to a pod
    targetMemoryUtilizationPercentage: 80

  # [node selector](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector) to constrain pods to nodes
  nodeSelector: {}
  # [tolerations](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) to configure preferred nodes
  tolerations: []
  # [affinity](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity) to configure which nodes the pods can be scheduled on
  affinity: {}

  # The [pod security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod) defines privilege and access control settings for a Pod within the deployment
  podSecurityContext:
    seccompProfile:
      # -- Restrict a Container's Syscalls with seccomp
      type: RuntimeDefault
    # -- Runs all processes within a pod with a special uid
    runAsUser: 10100
    # -- Processes within a pod will belong to this guid
    runAsGroup: 10100
    # -- The owner for volumes and any files created within volumes will belong to this guid
    fsGroup: 10100

  # The [container security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container) defines privilege and access control settings for a Container within a pod
  securityContext:
    capabilities:
      # -- Specifies which capabilities to drop to reduce syscall attack surface
      drop:
        - ALL
      # -- Specifies which capabilities to add to issue specialized syscalls
      add: []
    # -- Whether the root filesystem is mounted in read-only mode
    readOnlyRootFilesystem: true
    # -- Controls [Privilege Escalation](https://kubernetes.io/docs/concepts/security/pod-security-policy/#privilege-escalation) enabling setuid binaries changing the effective user ID
    allowPrivilegeEscalation: false
    # -- Requires the container to run without root privileges
    runAsNonRoot: true
    # -- The container's process will run with the specified uid
    runAsUser: 10100

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Configurations for Helm tests
tests:
  # -- Configure the hook-delete-policy for Helm tests
  hookDeletePolicy: before-hook-creation,hook-succeeded

postgresql:
  # JDBC connection URL passed to the issuer-wallet runtime.
  jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/issuer"
  auth:
    # Name of the PostgreSQL database created on first start. Must match with postgresql.jdbcUrl path.
    database: "issuer"
    # PostgreSQL user that the issuer-wallet connects as.
    username: "user"
    # Password for the PostgreSQL user. Change before production use.
    password: "password"
  persistence:
    # Persist data across pod restarts.
    enabled: true
    size: 10Gi
    storageClass: ""
  # Initialization scripts ConfigMap
  initdb:
    scriptsConfigMap: ""         # Optional: ConfigMap with init scripts
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

vault:
  injector:
    enabled: false
  server:
    dev:
      # Run Vault in dev mode. All data is stored in memory and lost on pod restart.
      # Disable for production and configure a persistent storage backend instead.
      enabled: true
      # Root token used when dev mode is active. Must match vault.hashicorp.token.
      devRootToken: "root"
    # Optional post-start hook script executed inside the Vault container after startup.
    # Can be used to initialise the KV engine or apply policies. Must be set externally.
    postStart: 
  hashicorp:
    # URL of the Vault instance reachable from within the cluster.
    url: "http://{{ .Release.Name }}-vault:8200"
    # Vault token used by the issuer-wallet at runtime to read and write secrets.
    # If vault.server.dev.enabled is true vault.hashicorp.token match with vault.server.dev.devRootToken.
    token: "root"
    # Timeout in seconds for Vault HTTP requests.
    timeout: 30
    healthCheck:
      enabled: true
      standbyOk: true
    paths:
      # Mount path used for all issuer-wallet secrets
      secret: /v1/secret
      # Health endpoint polled by the issuer-wallet and the vault-init job
      health: /v1/sys/health
    init:
      # Whether to run the post-install vault-init job that seeds required secrets
      enabled: true
      # Vault alias under which the AES-256 encryption key is stored.
      aesKeyAlias: "issuer-wallet-aes-key-alias"
