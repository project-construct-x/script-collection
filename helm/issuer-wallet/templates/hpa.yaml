{{ if .Values.wallet.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "issuer-wallet.fullname" . }}
  labels:
    {{- include "issuer-wallet.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "issuer-wallet.fullname" . }}
  minReplicas: {{ .Values.wallet.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.wallet.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.wallet.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          averageUtilization: {{ .Values.wallet.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.wallet.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          averageUtilization: {{ .Values.wallet.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
{{- end }}
